<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login - Diet Dashboard</title>
  <link rel="stylesheet" href="style.css" />
</head>

<body class="auth-body">
  <div class="auth-container">
    <div class="auth-card">
      <p class="auth-kicker">Secure Access</p>
      <h1 class="auth-heading">Diet Dashboard Login</h1>
      <p class="auth-subtitle">Sign in to view nutritional insights, recipe search, and protected dashboard data.</p>

      <input type="email" id="email" placeholder="Email" class="auth-field" />
      <input type="password" id="password" placeholder="Password" class="auth-field" />

      <div class="auth-buttons">
        <button id="registerBtn" class="auth-btn auth-btn-secondary">Register</button>
        <button id="loginBtn" class="auth-btn auth-btn-primary">Login</button>
      </div>

      <div class="auth-divider"><span>or</span></div>

      <button id="googleBtn" class="auth-btn auth-btn-google">Sign in with Google</button>

      <p id="authMessage"></p>
    </div>
  </div>

  <script type="module" src="auth.js"></script>
</body>

</html>
